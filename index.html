<head>

    <title>Delivery Pricing Logic</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <form>
        <h1>Delivery Pricing</h1>
        <label for="totalOrder">Enter the total</label>

        <button type="button" onclick="shippingCost()">Calculate</button>

        <p id="shippingCost"></p>
    </form>
